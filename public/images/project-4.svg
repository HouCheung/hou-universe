<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1a0f"/>
      <stop offset="50%" style="stop-color:#1a2f1a"/>
      <stop offset="100%" style="stop-color:#0f1a0f"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(34,197,94,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>
  <rect width="800" height="450" fill="url(#grid4)"/>
  <!-- Terminal-style elements -->
  <rect x="120" y="100" width="560" height="260" rx="12" fill="rgba(0,0,0,0.4)" stroke="rgba(34,197,94,0.2)" stroke-width="1.5"/>
  <!-- Terminal dots -->
  <circle cx="145" cy="125" r="6" fill="#ef4444" opacity="0.6"/>
  <circle cx="167" cy="125" r="6" fill="#eab308" opacity="0.6"/>
  <circle cx="189" cy="125" r="6" fill="#22c55e" opacity="0.6"/>
  <!-- Terminal lines -->
  <rect x="145" y="155" width="200" height="8" rx="4" fill="rgba(34,197,94,0.3)"/>
  <rect x="145" y="178" width="320" height="8" rx="4" fill="rgba(34,197,94,0.2)"/>
  <rect x="145" y="201" width="260" height="8" rx="4" fill="rgba(34,197,94,0.25)"/>
  <rect x="145" y="230" width="140" height="8" rx="4" fill="rgba(34,197,94,0.15)"/>
  <rect x="145" y="260" width="380" height="8" rx="4" fill="rgba(34,197,94,0.18)"/>
  <rect x="145" y="290" width="180" height="8" rx="4" fill="rgba(34,197,94,0.22)"/>
  <rect x="145" y="320" width="100" height="8" rx="4" fill="rgba(16,185,129,0.2)"/>
  <!-- Cursor -->
  <rect x="250" y="318" width="10" height="10" rx="2" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="18" fill="rgba(134,239,172,0.5)" font-weight="bold">DEVTOOLKIT CLI</text>
</svg>
