<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg-hou" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060f"/>
      <stop offset="40%" style="stop-color:#0a1020"/>
      <stop offset="100%" style="stop-color:#0a0a18"/>
    </linearGradient>
    <linearGradient id="accent-hou" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow-hou" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="planet-grad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="grid-hou" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(96,165,250,0.05)" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="card-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.01)"/>
    </linearGradient>
  </defs>

  <!-- Deep space background -->
  <rect width="800" height="450" fill="url(#bg-hou)"/>
  <rect width="800" height="450" fill="url(#grid-hou)"/>

  <!-- Nebula glow -->
  <ellipse cx="600" cy="120" rx="200" ry="140" fill="rgba(59,130,246,0.04)"/>
  <ellipse cx="180" cy="350" rx="160" ry="100" fill="rgba(139,92,246,0.03)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="45" cy="32" r="1.2" opacity="0.7"/>
    <circle cx="120" cy="78" r="0.8" opacity="0.5"/>
    <circle cx="210" cy="25" r="1.0" opacity="0.6"/>
    <circle cx="340" cy="55" r="0.7" opacity="0.4"/>
    <circle cx="480" cy="38" r="1.3" opacity="0.7"/>
    <circle cx="560" cy="90" r="0.6" opacity="0.3"/>
    <circle cx="710" cy="42" r="1.1" opacity="0.6"/>
    <circle cx="770" cy="95" r="0.9" opacity="0.5"/>
    <circle cx="95" cy="160" r="0.7" opacity="0.4"/>
    <circle cx="680" cy="180" r="0.8" opacity="0.4"/>
    <circle cx="750" cy="280" r="0.6" opacity="0.3"/>
    <circle cx="30" cy="300" r="0.9" opacity="0.5"/>
    <circle cx="160" cy="250" r="0.7" opacity="0.4"/>
    <circle cx="50" cy="410" r="0.8" opacity="0.4"/>
    <circle cx="300" cy="400" r="0.6" opacity="0.3"/>
    <circle cx="450" cy="420" r="0.7" opacity="0.3"/>
    <circle cx="580" cy="380" r="0.5" opacity="0.3"/>
    <circle cx="690" cy="410" r="0.8" opacity="0.4"/>
  </g>

  <!-- Planet / orbital element (upper right area) -->
  <circle cx="680" cy="140" r="35" fill="url(#planet-grad)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
  <ellipse cx="680" cy="140" rx="60" ry="12" fill="none" stroke="rgba(99,102,241,0.2)" stroke-width="0.8" transform="rotate(-20 680 140)"/>
  <ellipse cx="680" cy="140" rx="48" ry="9" fill="none" stroke="rgba(99,102,241,0.15)" stroke-width="0.6" transform="rotate(-20 680 140)"/>

  <!-- Web UI wireframe cards (left/center area) -->
  <!-- Card 1 - larger -->
  <rect x="100" y="140" width="220" height="100" rx="8" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <rect x="100" y="140" width="220" height="20" rx="8" fill="rgba(30,64,175,0.15)"/>
  <rect x="112" y="172" width="140" height="4" rx="2" fill="rgba(148,163,184,0.2)"/>
  <rect x="112" y="184" width="190" height="3" rx="1.5" fill="rgba(148,163,184,0.12)"/>
  <rect x="112" y="194" width="100" height="3" rx="1.5" fill="rgba(148,163,184,0.08)"/>
  <rect x="112" y="210" width="180" height="14" rx="4" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.2)" stroke-width="0.5"/>

  <!-- Card 2 - smaller, offset -->
  <rect x="120" y="260" width="180" height="75" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="120" y="260" width="180" height="16" rx="8" fill="rgba(30,64,175,0.1)"/>
  <rect x="132" y="288" width="110" height="4" rx="2" fill="rgba(148,163,184,0.18)"/>
  <rect x="132" y="298" width="150" height="3" rx="1.5" fill="rgba(148,163,184,0.1)"/>
  <rect x="132" y="308" width="90" height="3" rx="1.5" fill="rgba(148,163,184,0.08)"/>

  <!-- Card 3 - sidebar style -->
  <rect x="350" y="150" width="140" height="170" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="365" y="165" width="110" height="6" rx="3" fill="rgba(59,130,246,0.2)"/>
  <rect x="365" y="182" width="90" height="4" rx="2" fill="rgba(148,163,184,0.15)"/>
  <rect x="365" y="196" width="110" height="4" rx="2" fill="rgba(148,163,184,0.1)"/>
  <rect x="365" y="210" width="80" height="4" rx="2" fill="rgba(148,163,184,0.08)"/>
  <!-- sidebar nav dots -->
  <circle cx="375" cy="245" r="3" fill="rgba(59,130,246,0.3)"/>
  <circle cx="390" cy="245" r="3" fill="rgba(148,163,184,0.15)"/>
  <circle cx="405" cy="245" r="3" fill="rgba(148,163,184,0.15)"/>
  <circle cx="420" cy="245" r="3" fill="rgba(148,163,184,0.15)"/>

  <!-- Code/tech accent lines -->
  <line x1="530" y1="280" x2="580" y2="280" stroke="rgba(59,130,246,0.25)" stroke-width="1.5"/>
  <line x1="530" y1="295" x2="570" y2="295" stroke="rgba(99,102,241,0.2)" stroke-width="1.5"/>
  <line x1="530" y1="310" x2="560" y2="310" stroke="rgba(139,92,246,0.18)" stroke-width="1.5"/>
  <circle cx="530" cy="280" r="2.5" fill="rgba(59,130,246,0.4)"/>
  <circle cx="530" cy="295" r="2.5" fill="rgba(99,102,241,0.35)"/>
  <circle cx="530" cy="310" r="2.5" fill="rgba(139,92,246,0.3)"/>

  <!-- Glowing bottom accent bar -->
  <rect x="100" y="370" width="430" height="1.5" rx="0.75" fill="url(#accent-hou)" opacity="0.3"/>
  <rect x="100" y="370" width="430" height="1.5" rx="0.75" fill="url(#accent-hou)" opacity="0.15" filter="url(#blur-glow)"/>

  <!-- Title area -->
  <text x="400" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(248,250,252,0.7)" font-weight="300" letter-spacing="6">HOU UNIVERSE</text>
  <text x="400" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="rgba(148,163,184,0.35)" font-weight="300" letter-spacing="4">PERSONAL DEVELOPER PLATFORM</text>
</svg>
