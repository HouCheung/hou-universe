<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(96,165,250,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>
  <rect width="800" height="450" fill="url(#grid1)"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="2"/>
  <circle cx="650" cy="80" r="80" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <circle cx="150" cy="370" r="90" fill="none" stroke="rgba(139,92,246,0.12)" stroke-width="2"/>
  <!-- Flow lines -->
  <line x1="80" y1="180" x2="280" y2="180" stroke="url(#accent1)" stroke-width="2" opacity="0.5"/>
  <line x1="280" y1="180" x2="280" y2="280" stroke="url(#accent1)" stroke-width="2" opacity="0.4"/>
  <line x1="280" y1="280" x2="500" y2="280" stroke="url(#accent1)" stroke-width="2" opacity="0.3"/>
  <circle cx="80" cy="180" r="5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="280" cy="180" r="5" fill="#6366f1" opacity="0.8"/>
  <circle cx="280" cy="280" r="5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="500" cy="280" r="5" fill="#a78bfa" opacity="0.8"/>
  <!-- Center icon area -->
  <rect x="320" y="130" width="160" height="100" rx="12" fill="rgba(59,130,246,0.08)" stroke="rgba(59,130,246,0.2)" stroke-width="1.5"/>
  <text x="400" y="195" text-anchor="middle" font-family="monospace" font-size="20" fill="rgba(147,197,253,0.7)" font-weight="bold">KAFKA</text>
</svg>
