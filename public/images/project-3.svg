<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#051018"/>
      <stop offset="50%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#051018"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(6,182,212,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <rect width="800" height="450" fill="url(#grid3)"/>
  <!-- Orbital rings -->
  <ellipse cx="400" cy="225" rx="180" ry="80" fill="none" stroke="rgba(6,182,212,0.1)" stroke-width="1.5" transform="rotate(-15 400 225)"/>
  <ellipse cx="400" cy="225" rx="120" ry="55" fill="none" stroke="rgba(59,130,246,0.12)" stroke-width="1.5" transform="rotate(25 400 225)"/>
  <ellipse cx="400" cy="225" rx="60" ry="28" fill="none" stroke="rgba(6,182,212,0.15)" stroke-width="1.5" transform="rotate(-10 400 225)"/>
  <!-- Center planet -->
  <circle cx="400" cy="225" r="35" fill="rgba(6,182,246,0.08)" stroke="url(#accent3)" stroke-width="2"/>
  <circle cx="400" cy="225" r="12" fill="#3b82f6" opacity="0.6"/>
  <!-- Orbiting dots -->
  <circle cx="580" cy="200" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="220" cy="250" r="3" fill="#3b82f6" opacity="0.6"/>
  <circle cx="460" cy="145" r="3" fill="#06b6d4" opacity="0.5"/>
  <text x="400" y="370" text-anchor="middle" font-family="monospace" font-size="20" fill="rgba(125,211,252,0.6)" font-weight="bold">HOU UNIVERSE</text>
</svg>
